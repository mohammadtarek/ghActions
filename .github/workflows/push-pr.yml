on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "/src/**"
    pull_request:
      branches:
        - main
        - "release/**"
    jobs:
      tests:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Run tests
            run: |
              npm tests
        

