on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "src/**"        # ✅ removed leading slash
  pull_request:         # ✅ top-level trigger, not nested under push
    branches:
      - main
      - "release/**"

jobs:                   # ✅ top-level key, not nested under on.push
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          npm test      # ✅ correct npm command